<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ell takeshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff2d78;
      --pink-dim: #c4195a;
      --dark: #0a0a12;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: #0a0a12;
      color: #f0d6e4;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Video Background */
    #video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      opacity: 0.45;
      filter: brightness(0.50) contrast(1.2) saturate(1.4);
    }

    .profile-card {
      background: rgba(10, 10, 18, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,45,120,0.35);
      border-radius: 24px;
      padding: 2.8rem 2.2rem;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 0 80px rgba(255,45,120,0.28);
      z-index: 10;
    }

    .pfp {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid var(--pink);
      margin: 0 auto 1.2rem;
      box-shadow: 0 0 45px rgba(255,45,120,0.75);
      object-fit: cover;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff2d78, #ff8bb0, #ffd1e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .bio {
      font-size: 14.5px;
      color: #d8a5c0;
      font-style: italic;
      margin: 1rem 0 1.8rem;
      line-height: 1.5;
    }

    .discord-activity {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,45,120,0.25);
      border-radius: 16px;
      padding: 1.3rem;
      margin: 1.5rem 0;
      text-align: left;
      font-size: 13.5px;
    }

    .socials {
      display: flex;
      flex-direction: column;
      gap: 11px;
      margin-top: 1rem;
    }

    .social-link {
      background: rgba(255,45,120,0.07);
      border: 1px solid rgba(255,45,120,0.25);
      padding: 14px 20px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: #f0d6e4;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: rgba(255,45,120,0.2);
      border-color: var(--pink);
      transform: translateX(10px);
    }
  </style>
</head>
<body>

  <!-- Video Background -->
  <video id="video-bg" autoplay loop muted playsinline>
    <source src="https://github.com/Elltakeshi/ell-takeshi/blob/main/queen's%20new%20pv%20%F0%9F%92%96%20to%20be%20hero%20x%20edit%20era!%20-%20Andromeda%20x%20mvsterious%20%23anime.mp4?raw=true" type="video/mp4">
  </video>

  <div class="profile-card">
    <img src="https://github.com/Elltakeshi/ell-takeshi/blob/main/Cat.jpg?raw=true" 
         alt="ell takeshi" class="pfp">
    
    <h1 class="name">ell takeshi</h1>
    <p class="bio">cold words of a strong woman</p>

    <div class="discord-activity" id="activity">
      <strong>DISCORD ACTIVITY</strong><br>
      <span style="color:#22ff88;">● ONLINE</span><br>
      Loading status...
    </div>

    <div class="socials">
      <a href="https://discord.com/users/tedddyybun" target="_blank" class="social-link">💬 Discord — tedddyybun</a>
      <a href="https://www.roblox.com/users/search?keyword=tedddyybun" target="_blank" class="social-link">🎮 Roblox — tedddyybun</a>
      <a href="https://instagram.com/yogurtcupxsause" target="_blank" class="social-link">📷 Instagram — yogurtcupxsause</a>
    </div>
  </div>

  <script>
    // Live Discord Status
    const userId = "1252463582625660951";
    fetch(`https://api.lanyard.rest/v1/users/${userId}`)
      .then(res => res.json())
      .then(data => {
        const act = document.getElementById('activity');
        if (data.success && data.data) {
          const statusColor = data.data.discord_status === 'online' ? '#22ff88' : '#ff4444';
          const statusText = data.data.discord_status.toUpperCase();
          act.innerHTML = `<strong>DISCORD ACTIVITY</strong><br><span style="color:${statusColor};">● ${statusText}</span><br>no activity right now`;
        }
      })
      .catch(() => {
        document.getElementById('activity').innerHTML = `<strong>DISCORD ACTIVITY</strong><br><span style="color:#ffaa00;">● OFFLINE</span>`;
      });
  </script>
</body>
</html>
