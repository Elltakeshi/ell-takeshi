<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ell takeshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff2d78;
      --pink-dim: #c4195a;
      --pink-pale: #ffb3cc;
      --dark: #07070f;
      --text: #f0d6e4;
      --text-muted: #7a5068;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none;
    }

    @keyframes sparkleFade {
      0%   { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(.3) translateY(-20px); }
    }

    /* ── splash ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      background: var(--dark);
      transition: opacity 0.7s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    .splash-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 10vw, 5.5rem);
      background: linear-gradient(135deg, #ff2d78 0%, #ff8bb0 40%, #ffd1e3 70%, #ff2d78 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
    }

    .splash-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      border: 1px solid rgba(255,45,120,0.45);
      border-radius: 100px;
      background: rgba(255,45,120,0.08);
      color: var(--pink-pale);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s ease;
      animation: splashPulse 2.5s ease infinite;
    }
    .splash-btn:hover {
      background: rgba(255,45,120,0.18);
      border-color: rgba(255,45,120,0.75);
      color: #fff;
    }
    @keyframes splashPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,45,120,0.3); }
      50%      { box-shadow: 0 0 0 16px rgba(255,45,120,0); }
    }

    .splash-note {
      font-size: 9px;
      letter-spacing: 0.22em;
      color: rgba(122,80,104,0.5);
      text-transform: uppercase;
    }

    /* ── video background ── */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #bg-video.visible { opacity: 1; }

    /* dark overlay on top of video */
    #vid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(7, 7, 15, 0.52);
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }
    #vid-overlay.visible { opacity: 1; }

    /* mute toggle */
    #vol-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 500;
      display: none;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      border: 1px solid rgba(255,45,120,0.25);
      border-radius: 100px;
      background: rgba(13,13,26,0.78);
      backdrop-filter: blur(10px);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      cursor: none;
      transition: all 0.3s;
    }
    #vol-btn:hover { border-color: rgba(255,45,120,0.6); color: var(--text); }
    #vol-btn.show  { display: flex; }

    /* canvas + grain on top of video */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 3;
      opacity: 0.5;
    }

    /* ── main content ── */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 2.8rem;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink-dim);
      border: 1px solid rgba(255,45,120,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      animation: fadeDown 0.8s ease both;
    }

    .name-wrap { text-align: center; animation: fadeUp 0.9s 0.1s ease both; }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 12vw, 7rem);
      line-height: 0.95;
      background: linear-gradient(135deg, #ff2d78 0%, #ff8bb0 40%, #ffd1e3 70%, #ff2d78 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite, fadeUp 0.9s 0.1s ease both;
      filter: drop-shadow(0 0 60px rgba(255,45,120,0.3));
    }

    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .about {
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      animation: fadeUp 0.9s 0.2s ease both;
      text-align: center;
    }

    .about .cursor-blink {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--pink);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--pink);
      animation: pulseDot 2s ease infinite;
      transition: background 0.5s;
    }

    @keyframes pulseDot {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,45,120,0.6); }
      50%      { box-shadow: 0 0 0 6px rgba(255,45,120,0); }
    }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink-dim), transparent);
      animation: fadeUp 0.9s 0.35s ease both;
    }

    .socials {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .social-link {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 22px;
      border: 1px solid rgba(255,45,120,0.15);
      border-radius: 12px;
      background: rgba(13,13,26,0.6);
      backdrop-filter: blur(12px);
      text-decoration: none;
      color: var(--text-muted);
      font-size: 12px; letter-spacing: 0.05em;
      transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
      position: relative; overflow: hidden;
    }

    .social-link::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255,45,120,0.12), transparent 70%);
      opacity: 0; transition: opacity 0.35s ease;
    }

    .social-link:hover {
      border-color: rgba(255,45,120,0.5); color: var(--text);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px -8px rgba(255,45,120,0.25), 0 0 0 1px rgba(255,45,120,0.1);
    }
    .social-link:hover::before { opacity: 1; }

    .social-icon { width:18px; height:18px; fill:currentColor; flex-shrink:0; transition:color 0.3s; }
    .social-link:hover .social-icon { color: var(--pink); }
    .social-name   { font-weight: 400; }
    .social-handle { font-size: 10px; color: rgba(122,80,104,0.7); margin-top: 1px; }
    .social-text   { display: flex; flex-direction: column; }

    .footer {
      font-size: 9px; letter-spacing: 0.2em;
      color: rgba(122,80,104,0.35); text-transform: uppercase;
      animation: fadeUp 0.9s 0.55s ease both;
    }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width:480px) { .social-link { padding: 11px 16px; } }
  </style>
</head>

  <script>
    // ── magic wand cursor + sparkles ─────────────────────────────
    (function () {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><polygon points="7,1 8.5,5 12.7,5.2 9.4,7.8 10.5,11.9 7,9.5 3.5,11.9 4.6,7.8 1.3,5.2 5.5,5" fill="#ff69b4" stroke="#d63384" stroke-width="0.5"/><line x1="10" y1="11" x2="30" y2="30" stroke="#ffb6c1" stroke-width="2.5" stroke-linecap="round"/></svg>';
      var cur = 'url("data:image/svg+xml,' + encodeURIComponent(svg) + '") 7 1, auto';
      document.documentElement.style.cursor = cur;
      document.body.style.cursor = cur;

      var chars  = ['✦','✧','⊹','✩','·','✿'];
      var colors = ['#ff69b4','#ffb6c1','#ff1493','#ffc0cb','#ff85c2'];

      document.addEventListener('mousemove', function (e) {
        var s = document.createElement('div');
        s.textContent = chars[Math.floor(Math.random() * chars.length)];
        s.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;animation:sparkleFade 0.6s forwards;font-family:sans-serif;';
        s.style.left = (e.clientX - 6) + 'px';
        s.style.top  = (e.clientY - 6) + 'px';
        s.style.color = colors[Math.floor(Math.random() * colors.length)];
        s.style.fontSize = (Math.random() * 10 + 8) + 'px';
        document.body.appendChild(s);
        setTimeout(function () { s.remove(); }, 600);
      });
    })();

    // ── splash → enter ────────────────────────────────────────────
    const video    = document.getElementById('bg-video');
    const overlay  = document.getElementById('vid-overlay');
    const splash   = document.getElementById('splash');
    const volBtn   = document.getElementById('vol-btn');

    document.getElementById('enter-btn').addEventListener('click', function () {
      // user interacted — play with sound
      video.muted = false;
      video.play();
      video.classList.add('visible');
      overlay.classList.add('visible');

      splash.classList.add('hide');
      setTimeout(function () {
        splash.style.display = 'none';
        volBtn.classList.add('show');
      }, 700);

      startSite();
    });

    volBtn.addEventListener('click', function () {
      video.muted = !video.muted;
      volBtn.textContent = video.muted ? '🔇 unmute' : '🔊 mute';
    });

    // ── background canvas (orbs + particles) ─────────────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function rand(a, b) { return a + Math.random() * (b - a); }

    class Orb {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = rand(0,W); this.y = init ? rand(0,H) : rand(H*.5,H*1.2);
        this.r = rand(80,260); this.speed = rand(.15,.45);
        this.opacity = rand(.03,.07); this.hue = rand(330,350); this.drift = rand(-.3,.3);
      }
      update() { this.y -= this.speed; this.x += this.drift; if (this.y + this.r < 0) this.reset(false); }
      draw() {
        const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
        g.addColorStop(0, `hsla(${this.hue},100%,60%,${this.opacity})`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      }
    }

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = rand(0,W); this.y = init ? rand(0,H) : H+5;
        this.size = rand(.5,2); this.speed = rand(.3,.9);
        this.opacity = rand(.1,.5); this.flicker = Math.random()*Math.PI*2;
      }
      update() { this.y -= this.speed; this.flicker += .05; if (this.y < -5) this.reset(false); }
      draw() {
        const a = this.opacity * (.7 + .3*Math.sin(this.flicker));
        ctx.fillStyle = `rgba(255,45,120,${a})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
      }
    }

    const orbs = [], parts = [];
    for (let i = 0; i < 14; i++) orbs.push(new Orb());
    for (let i = 0; i < 60; i++) parts.push(new Particle());

    (function loop() {
      ctx.clearRect(0,0,W,H);
      orbs.forEach(o => { o.update(); o.draw(); });
      parts.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    })();

    // ── typing + Discord status (after enter) ─────────────────────
    function startSite() {
      const line = "i write code like no one's watching. because they're not.";
      const el   = document.getElementById('about-text');
      let i = 0;
      function type() {
        if (i <= line.length) {
          el.innerHTML = line.slice(0,i) + '<span class="cursor-blink"></span>';
          i++;
          setTimeout(type, 38 + Math.random()*30);
        }
      }
      setTimeout(type, 400);

      const DISCORD_ID = '1252463582625660951';
      const dot  = document.getElementById('status-dot');
      const stxt = document.getElementById('status-text');
      const sColors = { online:'#23d18b', idle:'#f5a623', dnd:'#ed4245', offline:'#747f8d' };
      const sLabels = { online:'online', idle:'idle', dnd:'do not disturb', offline:'offline' };

      async function fetchDiscord() {
        try {
          const json = await (await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`)).json();
          if (!json.success) return;
          const d = json.data;
          const s = d.discord_status || 'offline';
          dot.style.background = sColors[s] || '#747f8d';
          if (d.listening_to_spotify && d.spotify) {
            stxt.textContent = `🎵 ${d.spotify.song} — ${d.spotify.artist}`;
          } else if (d.activities && d.activities.length > 0) {
            const act = d.activities.find(a => a.type === 0) || d.activities[0];
            stxt.textContent = `${sLabels[s]} · playing ${act.name}`;
          } else {
            stxt.textContent = `discord: ${sLabels[s]}`;
          }
        } catch (_) {
          stxt.textContent = 'currently: building something';
        }
      }

      fetchDiscord();
      setInterval(fetchDiscord, 30000);
    }
  </script>
