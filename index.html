<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ell takeshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --pink: #ff2d78;
      --pink-glow: rgba(255, 45, 120, 0.3);
      --dark: #07070f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #f0d6e4;
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none;
    }

    canvas#bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.85;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 2.8rem;
    }

    /* Keep all your previous styles (badge, name, socials, etc.) */
    /* ... paste your original .badge, .name, .social-link, .footer etc. here ... */

    #sound-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255,45,120,0.15);
      border: 1px solid var(--pink);
      color: var(--pink);
      padding: 10px 14px;
      border-radius: 50px;
      font-size: 13px;
      cursor: none;
      transition: 0.3s;
    }
    #sound-btn:hover { background: rgba(255,45,120,0.3); }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div id="custom-cursor"></div>

  <div class="container">
    <!-- Your content -->
    <div class="badge">bio · ell takeshi</div>
    <div class="name-wrap">
      <h1 class="name">ell takeshi</h1>
    </div>
    <p class="about" id="about-text"></p>
    <div class="status">
      <div class="status-dot"></div>
      <span>currently: building something</span>
    </div>
    <div class="divider"></div>
    
    <div class="socials">
      <!-- your social links here -->
    </div>

    <div class="footer">made with ♡ — ell takeshi</div>
  </div>

  <button id="sound-btn">♪ Sound On</button>

  <script>
    // =============== CUSTOM CURSOR ===============
    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      if (Math.random() > 0.65) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = ['✦','✧','♡','❋'][Math.floor(Math.random()*4)];
        s.style.left = e.clientX + (Math.random()*16-8) + 'px';
        s.style.top = e.clientY + (Math.random()*16-8) + 'px';
        s.style.color = '#ff2d78';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 700);
      }
    });

    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      a.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // =============== ANIMATED BACKGROUND ===============
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 3.5 + 1;
        this.speedX = Math.random() * 0.6 - 0.3;
        this.speedY = Math.random() * 0.6 - 0.4;
        this.opacity = Math.random() * 0.6 + 0.3;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > W) this.speedX *= -1;
        if (this.y < 0 || this.y > H) this.speedY *= -1;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#ff2d78';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff69b4';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Create particles
    for (let i = 0; i < 120; i++) {
      particles.push(new Particle());
    }

    function connectParticles() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);

          if (dist < 130) {
            ctx.strokeStyle = `rgba(255, 45, 120, ${0.15 * (130 - dist)/130})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(7, 7, 15, 0.08)'; // faint trail
      ctx.fillRect(0, 0, W, H);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      connectParticles();
      requestAnimationFrame(animate);
    }
    animate();

    // =============== SOUND EFFECT ===============
    let audio;
    const soundBtn = document.getElementById('sound-btn');

    function initAudio() {
      if (!audio) {
        audio = new Audio('https://freesound.org/data/previews/202/202785_3724843-lq.mp3'); // soft ambient
        audio.loop = true;
        audio.volume = 0.25;
      }
    }

    soundBtn.addEventListener('click', () => {
      initAudio();
      if (audio.paused) {
        audio.play();
        soundBtn.textContent = '♪ Sound Off';
      } else {
        audio.pause();
        soundBtn.textContent = '♪ Sound On';
      }
    });

    // Typing effect (simple version)
    const text = "i write code like no one's watching. because they're not.";
    const about = document.getElementById('about-text');
    let i = 0;
    function type() {
      if (i < text.length) {
        about.textContent = text.slice(0, i) + "█";
        i++;
        setTimeout(type, 45);
      }
    }
    setTimeout(type, 800);
  </script>
</body>
</html>
