<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ell takeshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff2d78;
      --pink-dim: #c4195a;
      --pink-pale: #ffb3cc;
      --pink-glow: rgba(255, 45, 120, 0.18);
      --dark: #07070f;
      --dark2: #0d0d1a;
      --dark3: #13131f;
      --text: #f0d6e4;
      --text-muted: #7a5068;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none;
    }

    /* custom cursor */
    #cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--pink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, opacity 0.3s;
      mix-blend-mode: screen;
    }
    #cursor-trail {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,45,120,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.15s ease, top 0.15s ease;
    }

    /* background canvas */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* main layout */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 2.8rem;
    }

    /* top badge */
    .badge {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink-dim);
      border: 1px solid rgba(255,45,120,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      animation: fadeDown 0.8s ease both;
    }

    /* name */
    .name-wrap {
      text-align: center;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 12vw, 7rem);
      line-height: 0.95;
      background: linear-gradient(135deg, #ff2d78 0%, #ff8bb0 40%, #ffd1e3 70%, #ff2d78 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite, fadeUp 0.9s 0.1s ease both;
      filter: drop-shadow(0 0 60px rgba(255,45,120,0.3));
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* about line */
    .about {
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      animation: fadeUp 0.9s 0.2s ease both;
      text-align: center;
    }

    .about .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--pink);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* status */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--pink);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,120,0.6); }
      50% { box-shadow: 0 0 0 6px rgba(255,45,120,0); }
    }

    /* divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink-dim), transparent);
      animation: fadeUp 0.9s 0.35s ease both;
    }

    /* socials grid */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 22px;
      border: 1px solid rgba(255,45,120,0.15);
      border-radius: 12px;
      background: rgba(13,13,26,0.6);
      backdrop-filter: blur(12px);
      text-decoration: none;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255,45,120,0.12), transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .social-link:hover {
      border-color: rgba(255,45,120,0.5);
      color: var(--text);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px -8px rgba(255,45,120,0.25), 0 0 0 1px rgba(255,45,120,0.1);
    }

    .social-link:hover::before { opacity: 1; }

    .social-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
      transition: color 0.3s ease;
    }

    .social-link:hover .social-icon { color: var(--pink); }

    .social-name {
      font-weight: 400;
    }

    .social-handle {
      font-size: 10px;
      color: rgba(122, 80, 104, 0.7);
      margin-top: 1px;
    }

    .social-text { display: flex; flex-direction: column; }

    /* footer */
    .footer {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(122,80,104,0.35);
      text-transform: uppercase;
      animation: fadeUp 0.9s 0.55s ease both;
    }

    /* animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* mobile */
    @media (max-width: 480px) {
      .social-link { padding: 11px 16px; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <script>
    const cursor = document.getElementById('cursor');
    const trail = document.getElementById('cursor-trail');
    let mx = 0, my = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
      setTimeout(() => {
        trail.style.left = mx + 'px';
        trail.style.top = my + 'px';
      }, 80);
    });

    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, orbs = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function randBetween(a, b) { return a + Math.random() * (b - a); }

    class Orb {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = randBetween(0, W);
        this.y = init ? randBetween(0, H) : randBetween(H * 0.5, H * 1.2);
        this.r = randBetween(80, 260);
        this.speed = randBetween(0.15, 0.45);
        this.opacity = randBetween(0.03, 0.10);
        this.hue = randBetween(330, 350);
        this.drift = randBetween(-0.3, 0.3);
      }
      update() {
        this.y -= this.speed;
        this.x += this.drift;
        if (this.y + this.r < 0) this.reset(false);
      }
      draw() {
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
        g.addColorStop(0, `hsla(${this.hue},100%,60%,${this.opacity})`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 14; i++) orbs.push(new Orb());

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = randBetween(0, W);
        this.y = init ? randBetween(0, H) : H + 5;
        this.size = randBetween(0.5, 2);
        this.speed = randBetween(0.3, 0.9);
        this.opacity = randBetween(0.1, 0.5);
        this.flicker = Math.random() * Math.PI * 2;
      }
      update() {
        this.y -= this.speed;
        this.flicker += 0.05;
        if (this.y < -5) this.reset(false);
      }
      draw() {
        const alpha = this.opacity * (0.7 + 0.3 * Math.sin(this.flicker));
        ctx.fillStyle = `rgba(255,45,120,${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const particles = [];
    for (let i = 0; i < 60; i++) particles.push(new Particle());

    function loop() {
      ctx.clearRect(0, 0, W, H);
      orbs.forEach(o => { o.update(); o.draw(); });
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    // typing effect
    const line = "i write code like no one's watching. because they're not.";
    const el = document.getElementById('about-text');
    let i = 0;
    function type() {
      if (i <= line.length) {
        el.innerHTML = line.slice(0, i) + '<span class="cursor-blink"></span>';
        i++;
        setTimeout(type, 38 + Math.random() * 30);
      }
    }
    setTimeout(type, 900);
  </script>
