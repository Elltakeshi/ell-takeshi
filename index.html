<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ell takeshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff2d78;
      --pink-dim: #c4195a;
      --dark: #0a0a12;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: #0a0a12;
      color: #f0d6e4;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Video Background */
    #video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      opacity: 0.52;
      filter: brightness(0.48) contrast(1.18) saturate(1.35);
    }

    .profile-card {
      background: rgba(10, 10, 18, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,45,120,0.4);
      border-radius: 24px;
      padding: 2.8rem 2.2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 90px rgba(255, 45, 120, 0.5),
                  0 0 140px rgba(255, 45, 120, 0.25);
      z-index: 10;
    }

    .pfp {
      width: 138px;
      height: 138px;
      border-radius: 50%;
      border: 6px solid var(--pink);
      margin: 0 auto 1.2rem;
      box-shadow: 0 0 50px rgba(255,45,120,0.8);
      object-fit: cover;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 3.4rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff2d78, #ff8bb0, #ffd1e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .bio {
      font-size: 14.5px;
      color: #d8a5c0;
      font-style: italic;
      margin: 0.8rem 0 1.8rem;
      line-height: 1.5;
    }

    .discord-activity {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,45,120,0.3);
      border-radius: 16px;
      padding: 1.3rem;
      margin: 1.5rem 0;
      text-align: left;
      font-size: 13.5px;
    }

    .socials {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 1rem;
    }
