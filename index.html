<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ell takeshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { 
      margin: 0; padding: 0; box-sizing: border-box; 
    }

    :root {
      --pink: #ff2d78;
      --pink-dim: #c4195a;
      --pink-glow: rgba(255, 45, 120, 0.25);
      --dark: #07070f;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none; /* Hide default cursor */
    }

    /* ==================== CUSTOM CURSOR ==================== */
    #custom-cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid var(--pink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: width 0.2s ease, height 0.2s ease, background 0.3s;
      box-shadow: 0 0 20px var(--pink-glow);
    }

    #custom-cursor::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.2s ease;
    }

    #custom-cursor.hover {
      width: 45px;
      height: 45px;
      background: rgba(255, 45, 120, 0.08);
    }

    /* Sparkle trail */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      font-size: 14px;
      animation: sparkleAnim 0.7s forwards;
      text-shadow: 0 0 8px currentColor;
    }

    @keyframes sparkleAnim {
      0%   { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.4) translateY(-35px); }
    }
  </style>
</head>
<body>

  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>

  <div class="container">
    <!-- Your existing content stays exactly the same -->
    <div class="badge">bio · ell takeshi</div>
    <div class="name-wrap">
      <h1 class="name">ell takeshi</h1>
    </div>
    <p class="about" id="about-text"><span class="cursor-blink"></span></p>
    <div class="status">
      <div class="status-dot"></div>
      <span>currently: building something</span>
    </div>
    <div class="divider"></div>
    <div class="socials">
      <!-- your social links (unchanged) -->
      ... (keep all your social links here) ...
    </div>
    <div class="footer">made with ♡ — ell takeshi</div>
  </div>

  <script>
    // =============== BEAUTIFUL CUSTOM CURSOR ===============
    const cursor = document.getElementById('custom-cursor');
    const sparkleChars = ["✦", "✧", "❋", "✹", "♡", "✿"];

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      // Sparkle trail
      if (Math.random() > 0.65) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
        sparkle.style.left = (e.clientX + Math.random() * 12 - 6) + 'px';
        sparkle.style.top = (e.clientY + Math.random() * 12 - 6) + 'px';
        sparkle.style.color = `hsl(${Math.random() * 15 + 330}, 100%, 75%)`; // pink range
        document.body.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 700);
      }
    });

    // Hover effect on clickable elements
    document.querySelectorAll('a, button, .social-link').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // Keep your existing canvas + typing script (unchanged)
    // ... paste all your old script content here (canvas, typing effect, etc.) ...
  </script>
</body>
</html>
